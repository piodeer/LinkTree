name: Fetch MakerWorld Waitlist Count

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch follower count via API
        run: |
          python3 - <<'EOF'
          import urllib.request, json, datetime

          endpoints = [
              "https://makerworld.com/api/v1/crowdfunding-service/campaign/256",
              "https://makerworld.com/api/v1/crowdfunding-service/campaigns/256",
              "https://makerworld.com/api/v1/crowdfunding-service/detail?id=256",
              "https://makerworld.com/api/v1/crowdfunding-service/campaign/detail/256",
              "https://makerworld.com/api/v1/crowdfunding-service/project/256",
              "https://makerworld.com/api/v1/crowdfunding-service/launch/256",
              "https://makerworld.com/api/v1/crowdfunding-service/item/256",
              "https://makerworld.com/api/v1/crowdfunding-service/256",
          ]

          headers = {
              "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36",
              "Accept": "application/json, text/plain, */*",
              "Referer": "https://makerworld.com/en/crowdfunding/256-orbio-the-rotating-table",
              "x-request-id": "crowdfunding-256",
          }

          followers = "?"
          for url in endpoints:
              try:
                  req = urllib.request.Request(url, headers=headers)
                  with urllib.request.urlopen(req, timeout=15) as r:
                      raw = r.read().decode()
                      print(f"\n✅ ERFOLG: {url}")
                      print(raw[:3000])

                      def find_field(obj, keys, depth=0):
                          if depth > 6: return None
                          if isinstance(obj, dict):
                              for k, v in obj.items():
                                  if any(k.lower() == key.lower() for key in keys):
                                      return str(v)
                                  result = find_field(v, keys, depth+1)
                                  if result: return result
                          elif isinstance(obj, list):
                              for item in obj:
                                  result = find_field(item, keys, depth+1)
                                  if result: return result
                          return None

                      data_raw = json.loads(raw)
                      found = find_field(data_raw, [
                          "followerCount", "followers", "follower",
                          "watcherCount", "watchers", "watchCount",
                          "notifyCount", "notificationCount",
                          "interestedCount", "waitlistCount",
                          "subscriberCount", "launchFollowerCount",
                      ])
                      if found:
                          followers = found
                          print(f"🎯 Gefunden: {followers}")
                          break

              except urllib.error.HTTPError as e:
                  print(f"❌ {url}: HTTP {e.code}")
              except Exception as e:
                  print(f"❌ {url}: {e}")

          result = {
              "waitlist": followers,
              "updated": datetime.datetime.now(datetime.timezone.utc).strftime("%Y-%m-%d %H:%M UTC")
          }
          with open("data.json", "w") as f:
              json.dump(result, f, indent=2)
          print(f"\n💾 Gespeichert: {result}")
          EOF

      - name: Commit data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "Update followers $(date -u '+%H:%M')"
          git push
