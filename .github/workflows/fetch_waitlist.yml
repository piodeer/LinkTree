name: Fetch MakerWorld Waitlist Count

on:
  schedule:
    - cron: '0 * * * *'   # jede Stunde
  workflow_dispatch:        # auch manuell startbar

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Playwright
        run: |
          pip install playwright --break-system-packages
          playwright install chromium --with-deps

      - name: Fetch waitlist count
        run: |
          python3 - <<'EOF'
          import json, datetime
          from playwright.sync_api import sync_playwright

          URL = "https://makerworld.com/en/crowdfunding/256-orbio-the-rotating-table"

          waitlist = "?"
          with sync_playwright() as p:
              browser = p.chromium.launch(headless=True)
              page = browser.new_page(user_agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36")
              try:
                  page.goto(URL, wait_until="networkidle", timeout=30000)
                  page.wait_for_timeout(4000)
                  
                  # Gesamten Text der Seite ausgeben (zum Debuggen)
                  text = page.inner_text("body")
                  print("=== SEITENTEXT (erste 2000 Zeichen) ===")
                  print(text[:2000])
                  print("========================================")

                  import re
                  # Suche nach Zahlen neben Wörtern wie "waitlist", "notification", "watcher"
                  patterns = [
                      r'(\d[\d,]*)\s*(?:people\s*on\s*the\s*(?:wait)?list|waitlist|watchers?|notification)',
                      r'(?:waitlist|watchers?|notification)[^\d]*(\d[\d,]*)',
                      r'(\d[\d,]*)\s*(?:Personen|Interessenten)',
                  ]
                  for pattern in patterns:
                      match = re.search(pattern, text, re.IGNORECASE)
                      if match:
                          waitlist = match.group(1).replace(',', '')
                          print(f"Gefunden mit Pattern '{pattern}': {waitlist}")
                          break
                  
                  if waitlist == "?":
                      print("Kein Match gefunden – bitte Log prüfen und Pattern anpassen")

              except Exception as e:
                  print(f"Fehler: {e}")
              finally:
                  browser.close()

          data = {
              "waitlist": waitlist,
              "updated": datetime.datetime.utcnow().strftime("%Y-%m-%d %H:%M UTC")
          }
          with open("data.json", "w") as f:
              json.dump(data, f, indent=2)
          print(f"Gespeichert: {json.dumps(data)}")
          EOF

      - name: Commit data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "Update waitlist $(date -u '+%H:%M')"
          git push
