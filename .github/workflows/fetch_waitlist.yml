name: Fetch MakerWorld Waitlist Count

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch waitlist count via API
        run: |
          python3 - <<'EOF'
          import urllib.request, json, datetime

          endpoints = [
              "https://makerworld.com/api/v1/crowdfunding/campaign/256",
              "https://makerworld.com/api/v1/crowdfunding/256",
              "https://makerworld.com/api/crowdfunding/256",
              "https://makerworld.com/api/v1/campaign/256",
          ]

          headers = {
              "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36",
              "Accept": "application/json, text/plain, */*",
              "Accept-Language": "en-US,en;q=0.9",
              "Referer": "https://makerworld.com/en/crowdfunding/256-orbio-the-rotating-table",
              "Origin": "https://makerworld.com",
          }

          waitlist = "?"
          for url in endpoints:
              try:
                  req = urllib.request.Request(url, headers=headers)
                  with urllib.request.urlopen(req, timeout=15) as r:
                      raw = r.read().decode()
                      print(f"\n=== {url} ===")
                      print(raw[:1000])
                      data_raw = json.loads(raw)
                      
                      for field in ["watcherCount", "watchers", "waitlist", "waitlistCount", 
                                    "followerCount", "followers", "notificationCount",
                                    "interestedCount", "subscriberCount", "backerCount"]:
                          if field in data_raw:
                              waitlist = str(data_raw[field])
                              print(f"Gefunden: {field} = {waitlist}")
                              break
                      
                      if waitlist != "?":
                          break
              except Exception as e:
                  print(f"Fehler {url}: {e}")

          result = {
              "waitlist": waitlist,
              "updated": datetime.datetime.now(datetime.timezone.utc).strftime("%Y-%m-%d %H:%M UTC")
          }
          with open("data.json", "w") as f:
              json.dump(result, f, indent=2)
          print(f"Gespeichert: {result}")
          EOF

      - name: Commit data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "Update waitlist $(date -u '+%H:%M')"
          git push
