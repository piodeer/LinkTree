name: Fetch MakerWorld Waitlist Count

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch followerCount from MakerWorld
        run: |
          python3 - <<'EOF'
          import urllib.request, json, datetime, re

          # Zuerst die aktuelle Build-ID aus dem HTML holen
          headers = {
              "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36",
              "Accept": "text/html,application/xhtml+xml",
              "Accept-Language": "en-US,en;q=0.9",
          }

          follower_count = "?"

          try:
              # Schritt 1: HTML laden und Build-ID extrahieren
              req = urllib.request.Request(
                  "https://makerworld.com/en/crowdfunding/256-orbio-the-rotating-table",
                  headers=headers
              )
              with urllib.request.urlopen(req, timeout=15) as r:
                  html = r.read().decode("utf-8", errors="ignore")

              # Build-ID aus _next/static oder __NEXT_DATA__ extrahieren
              build_id = None
              match = re.search(r'"buildId":"([^"]+)"', html)
              if match:
                  build_id = match.group(1)
                  print(f"Build-ID gefunden: {build_id}")

              if not build_id:
                  # Alternativ aus Script-Tags
                  match = re.search(r'/_next/static/([^/]+)/', html)
                  if match:
                      build_id = match.group(1)
                      print(f"Build-ID (alt): {build_id}")

              if build_id:
                  # Schritt 2: JSON-Daten laden
                  json_url = f"https://makerworld.com/_next/data/{build_id}/en/crowdfunding/256-orbio-the-rotating-table.json"
                  print(f"JSON URL: {json_url}")

                  req2 = urllib.request.Request(json_url, headers={
                      "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36",
                      "Accept": "application/json",
                      "Referer": "https://makerworld.com/",
                  })
                  with urllib.request.urlopen(req2, timeout=15) as r2:
                      data = json.load(r2)

                  # followerCount extrahieren
                  follower_count = str(data["pageProps"]["detail"]["followerCount"])
                  print(f"✅ followerCount: {follower_count}")

          except Exception as e:
              print(f"❌ Fehler: {e}")

          result = {
              "waitlist": follower_count,
              "updated": datetime.datetime.now(datetime.timezone.utc).strftime("%Y-%m-%d %H:%M UTC")
          }
          with open("data.json", "w") as f:
              json.dump(result, f, indent=2)
          print(f"Gespeichert: {result}")
          EOF

      - name: Commit data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "Update followers $(date -u '+%H:%M')"
          git push
